# Nginx configuration for TradeVault
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/
# sudo ln -s /etc/nginx/sites-available/tradevault /etc/nginx/sites-enabled/

# This assumes your main site (yashkumarvaibhav.me) already has an nginx server block.
# Add this location block INSIDE that existing server block:

# ─── Add this inside your existing server { } block ──────────

location /TradeVault/ {
    proxy_pass http://127.0.0.1:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Script-Name /TradeVault;
    proxy_redirect off;
}

location /TradeVault/static/ {
    alias /home/yashkumarvaibhav/Desktop/ArpitProject/static/;
    expires 7d;
    add_header Cache-Control "public, immutable";
}
