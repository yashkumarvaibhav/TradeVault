{% extends "base.html" %}
{% block title %}Forgot Password – TradeVault{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <a href="{{ url_for('login') }}" class="auth-back"><i class="fas fa-arrow-left"></i> Back to Login</a>
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-key"></i></div>
            <h1>Recover Password</h1>
            <p>Reset your password using your username and TOTP code</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="Your username" autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-shield-halved"></i> TOTP Code</label>
                <input type="text" name="totp_code" required placeholder="6-digit code"
                       maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                       autocomplete="one-time-code" class="totp-input">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> New Password</label>
                <input type="password" name="new_password" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm New Password</label>
                <input type="password" name="confirm_password" required placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-rotate"></i> Reset Password
            </button>
        </form>
        <div class="auth-footer">
            Remembered your password? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
