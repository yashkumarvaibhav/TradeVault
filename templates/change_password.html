{% extends "base.html" %}
{% block title %}Change Password - TradeVault{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <a href="{{ url_for('dashboard') }}" class="auth-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-key"></i></div>
            <h1>Change Password</h1>
            <p>Confirm your current password and authenticator code before changing login credentials.</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Current Password</label>
                <input type="password" name="current_password" required placeholder="Current password" autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-shield-halved"></i> TOTP Code</label>
                <input type="text" name="totp_code" required placeholder="6-digit code"
                       maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                       autocomplete="one-time-code" class="totp-input">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> New Password</label>
                <input type="password" name="new_password" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm New Password</label>
                <input type="password" name="confirm_password" required placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-rotate"></i> Change Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
