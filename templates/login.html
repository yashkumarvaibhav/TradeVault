{% extends "base.html" %}
{% block title %}Login – TradeVault{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <a href="{{ url_for('landing') }}" class="auth-back"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-chart-line"></i></div>
            <h1>Welcome Back</h1>
            <p>Sign in to your trading journal</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="Your username" autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> TOTP Code</label>
                <input type="text" name="totp_code" required placeholder="6-digit code"
                       maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                       autocomplete="one-time-code" class="totp-input">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
