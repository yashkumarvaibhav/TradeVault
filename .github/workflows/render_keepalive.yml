name: Keep Render Service Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        env:
          DEFAULT_URL: "https://tradevault.yashkumarvaibhav.me/healthz"
          SECRET_URL: ${{ secrets.RENDER_PING_URL }}
        run: |
          set -eu
          URL="$DEFAULT_URL"
          if [ -n "${SECRET_URL}" ]; then
            URL="$SECRET_URL"
          fi
          echo "Pinging: $URL"
          curl --fail --silent --show-error --max-time 25 "$URL" >/dev/null
